<!DOCTYPE html>
<html>
<head>
    <title>Train Model - Placement Prediction System</title>
    <style>
        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            margin: 20px;
            background: #0a0e27;
            color: #00ff41;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: rgba(0, 255, 65, 0.03);
            padding: 20px;
            border-radius: 0;
            border: 1px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.15);
        }
        h1 {
            color: #00ff41;
            text-shadow: 0 0 5px #00ff41;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #00ff41;
            border-radius: 0;
            background: rgba(0, 255, 65, 0.05);
            color: #00ff41;
        }
        button {
            background: #00ff41;
            color: #0a0e27;
            border: 1px solid #00ff41;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }
        button:hover {
            background: #00cc33;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }
        .alert {
            border: 1px solid #00ff41;
            background: rgba(0, 255, 65, 0.1);
            color: #00ff41;
            padding: 15px;
            border-radius: 0;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00ff41;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .back-link:hover {
            text-shadow: 0 0 8px #00ff41;
        }
        .btn {
            color: #0a0e27 !important;
            background: #00ff41 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Training Disabled</h1>
        <div class="alert alert-info" role="alert" style="border-radius: 10px; padding: 16px; margin-bottom: 20px; background: #e9f5ff; border: 1px solid #b6e0fe; color: #055160;">
            The system uses a pre-trained model. Manual training via the UI is disabled.
        </div>
        <div class="mt-3">
            <a href="{% url 'list_models' %}" class="btn btn-primary">View Models</a>
            <a href="{% url 'dashboard' %}" class="btn btn-link">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
