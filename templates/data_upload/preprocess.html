<!DOCTYPE html>
<html>
<head>
    <title>Preprocess Data - Placement Prediction System</title>
    <style>
        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            margin: 20px;
            background: #0a0e27;
            color: #00ff41;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: rgba(0, 255, 65, 0.03);
            padding: 20px;
            border-radius: 0;
            border: 1px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.15);
        }
        h1 {
            color: #00ff41;
            text-shadow: 0 0 5px #00ff41;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        label {
            color: #00ff41;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            display: block;
            margin-top: 10px;
        }
        select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #00ff41;
            border-radius: 0;
            background: rgba(0, 255, 65, 0.05);
            color: #00ff41;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
        }
        button {
            background: #00ff41;
            color: #0a0e27;
            border: 1px solid #00ff41;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }
        button:hover {
            background: #00cc33;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00ff41;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .back-link:hover {
            text-shadow: 0 0 8px #00ff41;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Data Preprocessing</h1>
        <form method="post">
            {% csrf_token %}
            <label>Handle Missing Values:</label>
            <select name="handle_missing">
                <option value="drop">Drop rows with missing values</option>
                <option value="mean">Fill with mean</option>
                <option value="median">Fill with median</option>
            </select>
            
            <label>Scaling Method:</label>
            <select name="scaling">
                <option value="standard">Standard Scaling</option>
                <option value="minmax">Min-Max Scaling</option>
                <option value="none">No Scaling</option>
            </select>
            
            <button type="submit">Apply Preprocessing</button>
        </form>
        <a href="{% url 'upload_data' %}" class="back-link">Back to Upload</a>
    </div>
</body>
</html>
