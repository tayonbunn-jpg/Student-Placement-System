# render.yaml

databases:
  - name: placement-db
    databaseName: placement
    user: placement_user
    plan: free
    region: oregon

services:
  - type: web
    name: placement-prediction-system
    runtime: python
    plan: free
    region: oregon
    buildCommand: "./build.sh"
    startCommand: "gunicorn placement_system.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: placement-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: WEB_CONCURRENCY
        value: 4